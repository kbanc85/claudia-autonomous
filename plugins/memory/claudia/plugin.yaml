name: claudia
display_name: "Claudia Hybrid Memory"
version: "1.0.0"
abc_version: "1.0"
description: |
  Local-first, trust-aware memory provider. SQLite + vector embeddings
  via Ollama with hybrid ranking (vector + importance + recency + FTS
  + rehearsal). Extracts entities and commitments from conversations,
  merges duplicates, decays unverified memories, and lets the user
  verify, flag, contradict, or correct any fact via LLM tool calls.
  Exposes 18 memory.* tools and implements the full MemoryProvider
  ABC lifecycle. Runs 100% locally — no network required beyond
  Ollama on localhost.

  Works offline: if Ollama is unreachable, the plugin runs in a
  degraded FTS + importance + recency mode without crashing.

author: "Kamil Banc"
license: MIT
requires:
  - sqlite3  # stdlib, always available
  - httpx    # fork-level dependency
  # Optional runtime:
  # - Ollama daemon (http://localhost:11434) for embeddings,
  #   extraction, and detection. Pulled by the user via:
  #     ollama pull all-minilm:l6-v2
  #     ollama pull qwen2.5:3b
  #   Plugin degrades gracefully when absent.
category: memory
